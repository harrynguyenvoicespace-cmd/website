<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BloxLab Studio Viewport</title>
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/viewport.css?v=studio-editor-200" />
  </head>
  <body class="studio-body">
    <main class="studio-shell">
      <header class="editor-topbar">
        <a class="studio-brand" href="./index.html" aria-label="BloxLab home">
          <span class="brand-mark"></span>
          <strong>BloxLab</strong>
        </a>
        <nav class="editor-tabs" aria-label="Studio sections">
          <button class="editor-tab is-active" type="button" data-panel-tab="home">Home</button>
          <button class="editor-tab" type="button" data-panel-tab="model">Model</button>
          <button class="editor-tab" type="button" data-panel-tab="view">View</button>
        </nav>
        <div class="editor-status">
          <span data-save-state>Scene ready</span>
          <button class="topbar-button" type="button" data-logout>Logout</button>
        </div>
      </header>

      <section class="editor-ribbon" aria-label="Viewport tools">
        <div class="ribbon-group" aria-label="Transform tools">
          <button class="ribbon-button is-active" type="button" data-tool="select" title="Select"><i data-lucide="mouse-pointer-2" aria-hidden="true"></i><span>Select</span></button>
          <button class="ribbon-button" type="button" data-tool="move" title="Move"><i data-lucide="move-3d" aria-hidden="true"></i><span>Move</span></button>
          <button class="ribbon-button" type="button" data-tool="scale" title="Scale"><i data-lucide="maximize" aria-hidden="true"></i><span>Scale</span></button>
          <button class="ribbon-button" type="button" data-tool="rotate" title="Rotate"><i data-lucide="rotate-3d" aria-hidden="true"></i><span>Rotate</span></button>
          <button class="ribbon-button" type="button" data-tool="transform" title="Transform"><i data-lucide="scan" aria-hidden="true"></i><span>Transform</span></button>
        </div>

        <div class="ribbon-group" aria-label="Scene tools">
          <button class="ribbon-button" type="button" data-add-box title="Add block"><i data-lucide="cuboid" aria-hidden="true"></i><span>Part</span></button>
          <button class="ribbon-button" type="button" data-add-sphere title="Add sphere"><i data-lucide="circle" aria-hidden="true"></i><span>Sphere</span></button>
          <button class="ribbon-button" type="button" data-delete-selected title="Delete selected"><i data-lucide="trash-2" aria-hidden="true"></i><span>Delete</span></button>
        </div>

        <div class="ribbon-group" aria-label="Viewport options">
          <button class="ribbon-button is-active" type="button" data-toggle-snap title="Snap"><i data-lucide="magnet" aria-hidden="true"></i><span>Snap</span></button>
          <button class="ribbon-button is-active" type="button" data-toggle-grid title="Grid"><i data-lucide="grid-3x3" aria-hidden="true"></i><span>Grid</span></button>
          <button class="ribbon-button" type="button" data-toggle-profiler title="Profiler"><i data-lucide="activity" aria-hidden="true"></i><span>Profiler</span></button>
          <button class="ribbon-button" type="button" data-reset-camera title="Reset camera"><i data-lucide="camera" aria-hidden="true"></i><span>Camera</span></button>
        </div>
      </section>

      <section class="editor-workspace">
        <aside class="studio-sidebar" aria-label="Studio tools">
          <section class="sidebar-card">
            <div class="card-heading"><span>Scene Explorer</span><strong data-object-count>0</strong></div>
            <div class="scene-list" data-scene-list></div>
          </section>

          <section class="sidebar-card">
            <div class="card-heading"><span>Viewport</span><strong data-current-tool>Select</strong></div>
            <div class="tool-stack">
              <button class="tool-row is-active" type="button" data-tool-shortcut="select"><i data-lucide="mouse-pointer-2" aria-hidden="true"></i><span>Select object</span></button>
              <button class="tool-row" type="button" data-tool-shortcut="move"><i data-lucide="move-3d" aria-hidden="true"></i><span>Move gizmo</span></button>
              <button class="tool-row" type="button" data-tool-shortcut="scale"><i data-lucide="maximize" aria-hidden="true"></i><span>Scale gizmo</span></button>
              <button class="tool-row" type="button" data-tool-shortcut="rotate"><i data-lucide="rotate-3d" aria-hidden="true"></i><span>Rotate gizmo</span></button>
            </div>
          </section>
        </aside>

        <section class="viewport-panel" aria-label="BabylonJS viewport">
          <div class="canvas-wrap">
            <canvas id="studioCanvas" aria-label="3D studio viewport"></canvas>
            <div class="viewport-hud">
              <span>FPS <strong data-fps>--</strong></span>
              <span>Tool <strong data-hud-tool>Select</strong></span>
              <span>Selected <strong data-selected-name>None</strong></span>
            </div>
            <div class="viewport-profiler" data-profiler hidden>
              <div class="profiler-head"><strong>Viewport Profiler</strong><button type="button" data-close-profiler aria-label="Close profiler">x</button></div>
              <dl class="profiler-grid">
                <div><dt>FPS</dt><dd data-profiler-fps>--</dd></div>
                <div><dt>Meshes</dt><dd data-profiler-meshes>--</dd></div>
                <div><dt>Active</dt><dd data-profiler-active>--</dd></div>
                <div><dt>Materials</dt><dd data-profiler-materials>--</dd></div>
              </dl>
            </div>
          </div>
        </section>

        <aside class="properties-panel" aria-label="Properties">
          <section class="sidebar-card properties-card">
            <div class="card-heading"><span>Properties</span><strong data-properties-state>Idle</strong></div>
            <div class="selected-summary">
              <div class="selected-icon"><i data-lucide="box" aria-hidden="true"></i></div>
              <div><p data-property-name>No object selected</p><span data-property-type>Select a mesh in the viewport or explorer.</span></div>
            </div>

            <div class="property-section">
              <h3>Transform</h3>
              <div class="property-grid">
                <label><span>X</span><input type="number" step="0.1" data-transform-field="position.x" disabled /></label>
                <label><span>Y</span><input type="number" step="0.1" data-transform-field="position.y" disabled /></label>
                <label><span>Z</span><input type="number" step="0.1" data-transform-field="position.z" disabled /></label>
                <label><span>RX</span><input type="number" step="1" data-transform-field="rotation.x" disabled /></label>
                <label><span>RY</span><input type="number" step="1" data-transform-field="rotation.y" disabled /></label>
                <label><span>RZ</span><input type="number" step="1" data-transform-field="rotation.z" disabled /></label>
                <label><span>SX</span><input type="number" step="0.1" min="0.1" data-transform-field="scaling.x" disabled /></label>
                <label><span>SY</span><input type="number" step="0.1" min="0.1" data-transform-field="scaling.y" disabled /></label>
                <label><span>SZ</span><input type="number" step="0.1" min="0.1" data-transform-field="scaling.z" disabled /></label>
              </div>
            </div>

            <div class="property-section">
              <h3>Material</h3>
              <label class="wide-control"><span>Color</span><input type="color" value="#53c8d1" data-material-color disabled /></label>
              <label class="wide-control"><span>Surface</span><select data-material-type disabled><option value="matte">Matte</option><option value="metal">Metal</option><option value="glass">Glass</option><option value="emissive">Emissive</option></select></label>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylon.gridMaterial.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="./scripts/config.js"></script>
    <script src="./scripts/viewport.js?v=studio-editor-200"></script>
  </body>
</html>
